packages:
  - 'apps/*'
  - 'workers/*'

saveExact: true
allowBuilds:
  esbuild: true
  lefthook: true
  sharp: true
  workerd: true

catalogMode: strict

catalogs:
  astro:
    '@astrojs/check': 0.9.9
    '@astrojs/cloudflare': 14.0.2
    '@astrojs/mdx': 7.0.0
    '@astrojs/preact': 6.0.0
    '@astrojs/rss': 4.0.19
    '@astrojs/sitemap': 3.7.3
    '@astrojs/ts-plugin': 1.10.9
    astro: 7.0.4
  cli:
    npm-run-all2: 8.0.4
  css:
    '@pandacss/dev': 1.4.2
    'kiso.css': 1.2.4
  format:
    '@prettier/plugin-oxc': 0.0.4
    prettier: 3.6.2
    prettier-plugin-astro: 0.14.1
  git:
    lefthook: 1.13.0
  preact:
    preact: 10.28.3
  runtime:
    '@types/node': 24.0.10
    typescript: 5.8.3
    '@typescript/native-preview': 7.0.0-dev.20251017.1
  cloudflare:
    wrangler: 4.106.0
    '@cloudflare/workers-types': 4.20250903.0
  storybook:
    '@storybook/addon-a11y': 10.2.7
    '@storybook/preact-vite': 10.2.7
    storybook: 10.2.7
  react:
    react: 19.2.4
  oxlint:
    oxlint: 1.14.0
  util:
    dayjs: 1.11.18
    sharp: 0.34.3
  pnpm:
    pnpm: 10.29.2
  hono:
    hono: 4.10.0

minimumReleaseAgeExclude:
  - '@astrojs/cloudflare@14.0.2'
  - '@astrojs/compiler-binding-darwin-arm64@0.3.0'
  - '@astrojs/compiler-binding-darwin-x64@0.3.0'
  - '@astrojs/compiler-binding-linux-arm64-gnu@0.3.0'
  - '@astrojs/compiler-binding-linux-arm64-musl@0.3.0'
  - '@astrojs/compiler-binding-linux-x64-gnu@0.3.0'
  - '@astrojs/compiler-binding-linux-x64-musl@0.3.0'
  - '@astrojs/compiler-binding-wasm32-wasi@0.3.0'
  - '@astrojs/compiler-binding-win32-arm64-msvc@0.3.0'
  - '@astrojs/compiler-binding-win32-x64-msvc@0.3.0'
  - '@astrojs/compiler-binding@0.3.0'
  - '@astrojs/compiler-rs@0.3.0'
  - '@astrojs/rss@4.0.19'
  - astro@7.0.4
  - '@cloudflare/workerd-darwin-64@1.20260630.1'
  - '@cloudflare/workerd-darwin-arm64@1.20260630.1'
  - '@cloudflare/workerd-linux-64@1.20260630.1'
  - '@cloudflare/workerd-linux-arm64@1.20260630.1'
  - '@cloudflare/workerd-windows-64@1.20260630.1'
  - miniflare@4.20260630.0
  - workerd@1.20260630.1
  - wrangler@4.106.0
