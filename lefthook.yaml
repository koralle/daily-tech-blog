pre-commit:
  parallel: true
  jobs:
    - name: Format with Prettier
      glob:
        # root (specific files to avoid pnpm-lock.yaml)
        - 'package.json'
        - 'opencode.jsonc'
        - 'lefthook.yaml'
        - 'pnpm-workspace.yaml'
        - '*.md'
        - '*.{ts,mts,mjs,cjs,js,css}'

        # .github
        - '.github/**/*.{yaml,yml}'

        # apps/web
        - 'apps/web/*.{json,ts,mts,cjs}'
        - 'apps/web/.storybook/*.{ts,tsx}'
        - 'apps/web/panda/**/*.ts'
        - 'apps/web/src/**/*.{ts,tsx,astro,js,jsx,mjs,cjs,css,md,mdx}'

        # workers/images
        - 'workers/images/*.{json,ts}'
        - 'workers/images/src/**/*.{ts,js,mjs,cjs}'

        # docs
        - 'docs/**/*.md'
      run: |
        pnpm prettier {staged_files} --write
      stage_fixed: true
